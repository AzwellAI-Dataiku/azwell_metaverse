name: Deploy

on:
  push:
    branches: [main]

env:
  COMPOSE_PROJECT_NAME: metaverse
  DEPLOY_DIR: /data/claude/metaverse

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd $DEPLOY_DIR
          git pull origin main

      - name: Build and deploy
        run: |
          cd $DEPLOY_DIR
          docker compose up -d --build

      - name: Run database migrations
        run: |
          cd $DEPLOY_DIR
          docker compose exec -T server node apps/server/dist/db/migrate-manual.js || true

      - name: Verify deployment
        run: |
          sleep 10
          curl -f http://localhost:3000/api/health || exit 1
          echo "Deployment successful!"
