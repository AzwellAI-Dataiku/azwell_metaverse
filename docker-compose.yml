services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: metaverse
      POSTGRES_USER: metaverse
      POSTGRES_PASSWORD: metaverse_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metaverse"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    expose:
      - "4000"
    environment:
      DATABASE_URL: postgres://metaverse:metaverse_password@postgres:5432/metaverse
      JWT_SECRET: cyworld-metaverse-secret-key-2024
      PORT: "4000"
      CLIENT_URL: http://localhost:3000
      ADMIN_URL: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    ports:
      - "3001:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  pgdata:
